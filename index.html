<script>
    let carrinho = JSON.parse(localStorage.getItem('carrinhoDoceEncanto')) || [];
    const apiID = "ti9a03weq125d";
    const WHATSAPP = "5544998392373"; 

    function toggleG(id, tam) { document.getElementById(id).style.width = tam; }
    function fecharM() { document.getElementById('modalKit').style.display = 'none'; }
    function salvar() { localStorage.setItem('carrinhoDoceEncanto', JSON.stringify(carrinho)); }
    function gerarID() { return "DE-" + Math.floor(1000 + Math.random() * 9000); }

    function tratarCaminhoImagem(valor) {
        if (!valor || valor === "" || valor === "default.jpg") return "https://via.placeholder.com/300x200?text=Doce+Encanto";
        let v = valor.trim();
        return v.toLowerCase().startsWith('http') ? v : "imagens/" + v;
    }

    async function carregar() {
        const vitrine = document.getElementById('vitrine');
        try {
            const resposta = await fetch(`https://sheetdb.io/api/v1/${apiID}?sheet=Kits`);
            const dados = await resposta.json();
            vitrine.innerHTML = '';
            dados.forEach(item => {
                const nome = item.Kits || item.kits || item.Nome || item.A;
                const preco = item.Preco || item.preco || item.B || "0.00";
                const desc = item.Descricao || item.C || "";
                const rawImg = item.Imagen || item.Imagem || item.D || "";
                const urlImagem = tratarCaminhoImagem(rawImg);
                if (!nome || nome === "Kits") return;
                vitrine.innerHTML += `
                    <div class="card">
                        <img src="${urlImagem}" onerror="this.src='https://via.placeholder.com/300x200?text=Doce+Encanto'">
                        <h3>${nome}</h3>
                        <p style="font-weight:bold; color:var(--primaria)">R$ ${preco}</p>
                        <button class="btn-principal" onclick="abrirModal('${nome}', '${preco}', '${desc}', '${urlImagem}')">Ver Detalhes</button>
                    </div>`;
            });
            atualizarIcone();
        } catch (erro) { console.log("Erro ao carregar os kits"); }
    }

    function abrirModal(n, p, d, urlFinal) {
        document.getElementById('m-nome').innerText = n;
        document.getElementById('m-preco').innerText = "R$ " + p;
        document.getElementById('m-desc').innerText = d;
        document.getElementById('m-img').src = urlFinal;
        document.getElementById('modalKit').style.display = 'flex';
        document.getElementById('btn-confirmar').onclick = function() {
            carrinho.push({ nome: n, preco: p });
            salvar(); atualizarIcone(); fecharM(); toggleG('gavCart', '320px');
        };
    }

    function atualizarIcone() {
        document.getElementById('contagem').innerText = carrinho.length;
        renderizarCarrinho();
    }

    function renderizarCarrinho() {
        const lista = document.getElementById('lista-itens');
        let soma = 0;
        lista.innerHTML = '';
        if (carrinho.length === 0) {
            lista.innerHTML = '<p style="text-align:center">Carrinho vazio...</p>';
        } else {
            carrinho.forEach((item, index) => {
                let pLimpo = parseFloat(item.preco.toString().replace('R$', '').replace(',', '.').trim());
                soma += isNaN(pLimpo) ? 0 : pLimpo;
                lista.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <div style="text-align:left"><span>${item.nome}</span><br><small>R$ ${item.preco}</small></div>
                        <i class="fas fa-trash" onclick="remover(${index})" style="color:red; cursor:pointer;"></i>
                    </div>`;
            });
        }
        document.getElementById('total-carrinho').innerText = "Total: R$ " + soma.toFixed(2).replace('.', ',');
    }

    function remover(i) { carrinho.splice(i, 1); salvar(); atualizarIcone(); }

    // --- NOVA FUNÇÃO FINALIZAR ---
    async function fluxoFinalizar() {
        if(carrinho.length === 0) {
            alert("Seu carrinho está vazio!");
            return;
        }

        let nomeCli = "";
        const apenasLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ\s]+$/;

        // Validação do Nome
        while (true) {
            nomeCli = prompt("Digite seu NOME (Apenas letras):");
            if (nomeCli === null) return;
            nomeCli = nomeCli.trim();
            if (nomeCli === "") {
                alert("O nome não pode estar vazio!");
            } else if (!apenasLetras.test(nomeCli)) {
                alert("Por favor, use apenas LETRAS no nome.");
            } else {
                break;
            }
        }

        // Escolha da Entrega
        let localFinal = "";
        let opcao = prompt("COMO DESEJA RECEBER?\n1: BUSCAR NA SALA 9D\n2: COMBINAR ENTREGA");
        if (opcao === null) return;

        if (opcao === "1") {
            localFinal = "Sala 9D";
        } else if (opcao === "2") {
            localFinal = "A combinar";
        } else {
            alert("Opção inválida! Escolha 1 ou 2.");
            return;
        }

        const pedidoID = gerarID();
        const totalStr = document.getElementById('total-carrinho').innerText.replace('Total: R$ ', '');
        const itensConcatenados = carrinho.map(i => i.nome).join(" + ");

        try {
            // Bloqueia o botão para evitar envios duplos
            const btn = document.querySelector("#gavCart .btn-principal");
            if(btn) {
                btn.disabled = true;
                btn.innerText = "Enviando...";
            }

            // Envia para a aba 'pedidos' do SheetDB
            const response = await fetch(`https://sheetdb.io/api/v1/${apiID}?sheet=pedidos`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [{
                    "status": "Pendente", 
                    "id_pedido": pedidoID, 
                    "cliente": nomeCli, 
                    "local": localFinal, 
                    "itens": itensConcatenados, 
                    "valor": totalStr, 
                    "data_compra": new Date().toLocaleString('pt-BR')
                }]})
            });

            if(response.ok) {
                alert("✅ Pedido registrado!"); 
                const textoWhats = `*NOVO PEDIDO DOCES*%0A*ID:* ${pedidoID}%0A*Cliente:* ${nomeCli}%0A*Itens:* ${itensConcatenados}%0A*Total:* R$ ${totalStr}%0A*Local:* ${localFinal}`;
                window.location.href = `https://wa.me/${WHATSAPP}?text=${textoWhats}`;
                
                // Limpa carrinho
                carrinho = []; 
                localStorage.removeItem('carrinhoDoceEncanto'); 
                atualizarIcone(); 
                toggleG('gavCart', '0');
            }
        } catch (e) { 
            alert("Erro de conexão ao salvar pedido."); 
        } finally {
            const btn = document.querySelector("#gavCart .btn-principal");
            if(btn) {
                btn.disabled = false;
                btn.innerText = "Finalizar Pedido";
            }
        }
    }

    carregar();
</script>
